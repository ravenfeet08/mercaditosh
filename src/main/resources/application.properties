spring.application.name=mercaditosh
# ================================================================
#  application-prod.properties  —  PERFIL PRODUCCIÓN (YugabyteDB Cloud)
#
#  Cómo activarlo:
#   • Render / Azure: variable de entorno  SPRING_PROFILES_ACTIVE=prod
#   • IntelliJ (prueba local contra YugabyteDB):
#     Run → Edit Configurations → Environment variables
#     → agrega  SPRING_PROFILES_ACTIVE=prod
#
#  SEGURIDAD: NUNCA escribas credenciales reales aquí.
#  Todos los valores sensibles vienen de variables de entorno
#  que defines en el panel de Render/Azure (nunca en GitHub).
# ================================================================

# --- Servidor ---
server.port=${PORT:8085}
# PORT es la variable que Render inyecta automáticamente.
# El :8080 es el valor por defecto si PORT no existe (pruebas locales).

# --- Fuente de datos (YugabyteDB Cloud  —  compatible con PostgreSQL) ---
# La URL completa con SSL obligatorio que YugabyteDB te da en su panel:
#   Host: <cluster>.gcp.ybdb.io   Puerto: 5433   Base de datos: yugabyte
spring.datasource.url=${DB_URL}
# Ejemplo de DB_URL (pégalo en las variables de entorno, no aquí):
# jdbc:postgresql://<host>:5433/yugabyte?sslmode=require

spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Pool de conexiones  HikariCP (el pool por defecto de Spring Boot)
# YugabyteDB acepta hasta 15 conexiones en el plan gratuito.
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000

# --- JPA / Hibernate ---
# validate: solo verifica que el esquema coincide, NO modifica la BD.
# En producción nunca uses "update" ni "create".
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# Necesario para que Hibernate entienda el tipo SERIAL / SEQUENCE de YugabyteDB
spring.jpa.properties.hibernate.globally_quoted_identifiers=false

# --- Subida de archivos ---
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=15MB
# En producción Render/Azure el filesystem es efímero.
# Usa /tmp para archivos temporales o integra un storage externo (S3, Azure Blob).
app.upload.dir=/tmp/uploads

# --- Correo (Gmail SMTP)  —  credenciales desde variables de entorno ---
spring.mail.host=smtp.gmail.com
spring.mail.port=465
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# --- Springdoc ---
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html